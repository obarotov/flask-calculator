<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History</title>
    <style>
        body { background: #0f0f0f; color: #eee; font-family: sans-serif; display: flex; justify-content: center; padding: 2rem; }
        .container { width: 100%; max-width: 500px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .history-card { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        .item { padding: 1rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .item:last-child { border-bottom: none; }
        .exp { color: #fff; font-family: monospace; }
        .res { color: #1DB954; font-weight: bold; }
        .empty { padding: 2rem; text-align: center; color: #555; }
        .btn { color: #ff4444; background: none; border: 1px solid #442222; padding: 5px 10px; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.8rem; }
        .back { color: #888; text-decoration: none; font-size: 0.9rem; margin-top: 1rem; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>History</h1>

            {% if entries %}
            <a href="{{ url_for('clear_session') }}" class="btn">Clear All</a>
            {% endif %}
        </div>

        <div class="history-card">
            {% if entries %}
                {% for row in entries %}
                <div class="item">
                    <span class="exp">{{ row.expression }}</span>
                    <span class="res">{{ row.result }}</span>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty">No calculations found in history.</div>
            {% endif %}
        </div>

        <a href="{{ url_for('index') }}" class="back">← Back to Calculator</a>
    </div>
</body>
</html>
