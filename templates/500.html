<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background-color: black;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
  }

  h1 { 
    font-size: 4rem; 
    margin: 0; 
    color: #0f9150; 
  }
  
  p { 
    font-size: 1.2rem; 
    margin-bottom: 30px;
    color: #bdc3c7; 
  }

  /* The styled link button */
  .home-link {
    padding: 15px 30px;
    background-color: #2ecc71; /* The same safety green */
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'Courier New', Courier, monospace; /* Keeping the technical font */
    box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
    transition: all 0.3s ease;
  }

  .home-link:hover {
    background-color: #27ae60;
    box-shadow: 0 6px 20px rgba(39, 155, 87, 0.5);
    transform: translateY(-2px);
  }
</style>
</head>
<body>

  <h1 style="font-size: 150px;">500</h1>
  <p>The page that  you're looking for doesn't exist.</p>
  
  <a href="/" class="home-link">Go Home</a>

</body>
</html>
